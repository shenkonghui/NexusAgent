services:
  opennexus:
    build:
      context: .
      dockerfile: Dockerfile
    image: opennexus:latest
    container_name: opennexus
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/root/.openNexus
      - opennexus-npm-cache:/root/.npm
    environment:
      - SERVER_MODE=release
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET:-nexusagent-dev-secret-key-32+bytes!}
      # 默认时区
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  opennexus-npm-cache:
