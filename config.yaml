server:
  port: 8080
  mode: debug
  # 前端构建产物目录，release 模式下由后端服务静态文件实现单端口部署。
  # debug 模式下前端走 vite dev server (3000)，此项不生效。
  web_dist: ./web/dist
database:
  path: ./data/nexus.db
jwt:
  secret: "nexusagent-dev-secret-key-32+bytes!"
  access_ttl: 15m
  refresh_ttl: 168h
password:
  bcrypt_cost: 12
agents:
  workspace:
    default_mode: temporary
    temp_dir_prefix: nexus-
    # temporary 模式会话工作区的存放根目录，默认 ~/.nextAgent/session。
    # 由程序在删除会话时清理，不依赖操作系统清理临时目录。
    # session_dir: ~/.nextAgent/session
  claude_code:
    enabled: true
    command: npx
    args:
      - "-y"
      - "@zed-industries/claude-code-acp@latest"
    api_key_env: ANTHROPIC_API_KEY
    timeout: 300s
  # Agent Skill 扫描目录（相对项目 cwd 或用户 home，支持 ~ 与绝对路径；留空使用默认目录）
  skills:
    project_dirs:
      - .agents/skills
      - .claude/skills
    user_dirs:
      - .agents/skills
      - .claude/skills
  # Slash command 扫描目录（Markdown 文件，支持子目录；留空使用默认目录）
  slash_commands:
    project_dirs:
      - .cursor/commands
      - .claude/commands
    user_dirs:
      - .cursor/commands
      - .claude/commands
