server:
    port: 8080
    mode: debug
    web_dist: ./web/dist
logging:
    # 日志等级：debug | info | warn | error
    # debug 时会输出每次与 agent 的交互（prompt、session update、ACP 请求等）
    level: info
database:
    # 默认 ~/.openNexus/opennexus.db；可用 DATABASE_PATH 或 --data-dir 覆盖
    path: ~/.openNexus/opennexus.db
jwt:
    secret: "nexusagent-dev-secret-key-32+bytes!"
    access_ttl: 15m
    refresh_ttl: 168h
auth:
    # 开启后无需登录，自动使用内置 admin 用户
    auto_login: true
password:
    bcrypt_cost: 12
debug:
    acp:
        # 开启后记录 ACP JSON-RPC 原始报文与高层事件到本地目录，供对话页「调试」Tab 查看
        enabled: true
        dir: ~/.openNexus/acp-debug
agents:
    workspace:
        default_mode: temporary
        temp_dir_prefix: opennexus-
        # temporary 模式会话工作区的存放根目录，默认 ~/.openNexus/session。
        # 由程序在删除会话时清理，不依赖操作系统清理临时目录。
        session_dir: ~/.openNexus/session
    skills:
        # 用户级 skills 根目录（agentskills.io：递归扫描子目录中的 SKILL.md）
        user_dirs:
            - ~/.agents/skills
        # 相对工作区 cwd 的项目级 skills 子目录
        project_dirs:
            - .agents/skills
    commands:
        # Slash Command 目录（Claude Code 规范：递归扫描 *.md，支持子目录与符号链接目录，文件名即命令名）
        user_dirs:
            - ~/.agents/commands
        project_dirs:
            - .agents/commands
    rules:
        # Rule 路径：目录（递归扫描 *.mdc / *.md）或单个文件（如 CLAUDE.md）
        # alwaysApply: true 的规则（或无 frontmatter 的独立文件）经 session/new 的 _meta.systemPrompt 注入
        user_dirs:
            - ~/.cursor/rules
            - ~/.claude/CLAUDE.md
        project_dirs:
            - .cursor/rules
            - CLAUDE.md
    subagents:
        # subagent 根目录（递归扫描 *.md：frontmatter 含 name/description/model/tools，markdown 正文当 system_prompt）
        user_dirs:
            - ~/.agents/agents
        project_dirs:
            - .agents/agents
    mcp:
        # 全局共享 MCP server 配置文件（标准 mcpServers JSON 格式）。
        # 该文件中的 mcpServers 会注入给所有 agent 会话。可在设置页「MCP」Tab 编辑。
        config_path: ~/.agents/mcp.json
    # 单轮 prompt 的最大存活时间。prompt 的生命周期独立于发起它的 HTTP/SSE 请求
    # （SSE 断开不再误杀 agent），此超时兜底防 agent 卡死导致 goroutine 永久泄漏——
    # 超时后强制结束本轮并标记 interrupted，前端提示用户重发。默认 30m。
    prompt_max_duration: 30m
permissions:
    # 全局权限规则（yolo / 白名单 / 询问名单 / 黑名单），可在设置页「权限」Tab 编辑。
    # mode=normal：按 allow/ask/deny 列表匹配工具调用标题，未命中→询问
    # mode=yolo：全部自动放行（deny 命中除外）
    # 规则支持 * 通配符（如 "Bash(git status *)"），优先级：deny > allow > ask
    mode: normal
    allow: []
    ask: []
    deny: []
