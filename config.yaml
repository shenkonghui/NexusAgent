server:
  port: 8080
  mode: debug
  web_dist: ./web/dist
database:
  path: ./data/nexus.db
jwt:
  secret: "nexusagent-dev-secret-key-32+bytes!"
  access_ttl: 15m
  refresh_ttl: 168h
auth:
  # 开启后无需登录，自动使用内置 admin 用户
  auto_login: true
password:
  bcrypt_cost: 12
agents:
  workspace:
    default_mode: temporary
    temp_dir_prefix: nexus-
    # temporary 模式会话工作区的存放根目录，默认 ~/.nextAgent/session。
    # 由程序在删除会话时清理，不依赖操作系统清理临时目录。
    # session_dir: ~/.nextAgent/session
  claude_code:
    enabled: true
    command: npx
    args:
      - "-y"
      - "@zed-industries/claude-code-acp@latest"
    api_key_env: ANTHROPIC_API_KEY
    timeout: 300s
