name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || matrix.os == 'linux' && 'ubuntu-latest' || 'windows-latest' }}
    strategy:
      matrix:
        os: [darwin, linux, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev curl lsof
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          fi

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Binary (macOS/Linux)
        if: matrix.os != 'windows'
        run: |
          mkdir -p dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/opennexus-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/server

      - name: Build Binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:GOOS = "${{ matrix.os }}"
          $env:GOARCH = "${{ matrix.arch }}"
          $env:CGO_ENABLED = "0"
          go build -tags=sqlite_nocgo `
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" `
            -o "dist/opennexus-${{ matrix.os }}-${{ matrix.arch }}.exe" ./cmd/server

      - name: Package CLI (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          cd dist
          tar czf "opennexus-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "opennexus-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Package CLI (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/opennexus-${{ matrix.os }}-${{ matrix.arch }}.exe" `
            -DestinationPath "dist/opennexus-${{ matrix.os }}-${{ matrix.arch }}.zip" -Force

      # ========== 桌面客户端：macOS arm64 / Linux amd64 / Windows amd64 ==========
      - name: Setup Rust (Desktop)
        if: |
          (matrix.os == 'darwin' && matrix.arch == 'arm64') ||
          (matrix.os == 'linux' && matrix.arch == 'amd64') ||
          (matrix.os == 'windows' && matrix.arch == 'amd64')
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm (Desktop)
        if: |
          (matrix.os == 'darwin' && matrix.arch == 'arm64') ||
          (matrix.os == 'linux' && matrix.arch == 'amd64') ||
          (matrix.os == 'windows' && matrix.arch == 'amd64')
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pake-cli (Desktop)
        if: |
          (matrix.os == 'darwin' && matrix.arch == 'arm64') ||
          (matrix.os == 'linux' && matrix.arch == 'amd64') ||
          (matrix.os == 'windows' && matrix.arch == 'amd64')
        run: pnpm install -g pake-cli@3.13.0

      - name: Build macOS Desktop (arm64)
        if: matrix.os == 'darwin' && matrix.arch == 'arm64'
        run: |
          chmod +x scripts/build-pake.sh scripts/package-darwin.sh
          ./scripts/build-pake.sh dist ${{ github.ref_name }} app
          ./scripts/package-darwin.sh dist opennexus-darwin-arm64 dist
          cd dist && tar czf opennexus-darwin-desktop.tar.gz openNexus.app

      - name: Build Linux Desktop (amd64)
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          chmod +x scripts/build-pake.sh scripts/package-linux.sh
          ./scripts/build-pake.sh dist ${{ github.ref_name }} appimage
          ./scripts/package-linux.sh dist opennexus-linux-amd64 dist
          cd dist && tar czf opennexus-linux-desktop.tar.gz openNexus

      - name: Build Windows Desktop (amd64)
        if: matrix.os == 'windows' && matrix.arch == 'amd64'
        shell: bash
        run: |
          ./scripts/build-pake.sh dist ${{ github.ref_name }} x64

      - name: Package Windows Desktop (amd64)
        if: matrix.os == 'windows' && matrix.arch == 'amd64'
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 -OutDir dist -BinName opennexus-windows-amd64.exe -PakeDir dist
          Compress-Archive -Path dist/openNexus -DestinationPath dist/opennexus-windows-desktop.zip -Force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennexus-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  # ========== Electron 桌面客户端:macOS arm64 (.dmg) + Windows x86_64 (.exe) ==========
  # 独立 job，与 Pake 流程并存。两者产物都会进 Release。
  electron:
    name: Electron ${{ matrix.target }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
          - target: windows-x64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            electron/package-lock.json

      # CI runner 在国外，使用项目 .npmrc 里的国内镜像反而更慢/不稳定，临时移除
      - name: Remove China mirror config (CI)
        shell: bash
        run: rm -f electron/.npmrc

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      # Go 后端：macOS 用 CGO+真 SQLite；Windows 用纯 Go SQLite（无 gcc 依赖）
      - name: Build Backend (macOS)
        if: matrix.target == 'macos-arm64'
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o opennexus ./cmd/server

      - name: Build Backend (Windows)
        if: matrix.target == 'windows-x64'
        shell: pwsh
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -tags=sqlite_nocgo `
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" `
            -o opennexus.exe ./cmd/server

      # electron-builder 要求 package.json 的 version 是合法 semver（去掉 tag 前缀 v）
      - name: Set app version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs');const p=require('./electron/package.json');p.version='$VERSION';fs.writeFileSync('./electron/package.json',JSON.stringify(p,null,2))"
          cat electron/package.json

      - name: Install & Build (macOS)
        if: matrix.target == 'macos-arm64'
        working-directory: electron
        run: |
          npm install --no-audit --no-fund
          npx electron-builder --mac --arm64

      - name: Install & Build (Windows)
        if: matrix.target == 'windows-x64'
        working-directory: electron
        shell: pwsh
        run: |
          npm install --no-audit --no-fund
          npx electron-builder --win --x64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennexus-electron-${{ matrix.target }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.exe
            electron/dist/*.yml
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build, electron]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        run: |
          {
            echo "## openNexus ${{ github.ref_name }}"
            echo ""
            echo "### Electron 桌面客户端（推荐）"
            echo ""
            echo "| 平台 | 文件 | 说明 |"
            echo "|------|------|------|"
            echo "| macOS Apple Silicon | \`openNexus-*-arm64.dmg\` | 双击安装，拖入 Applications |"
            echo "| Windows x86_64 | \`openNexus-*-x64.exe\` | 双击 NSIS 安装程序 |"
            echo ""
            echo "### Pake 桌面客户端（轻量，系统 WebView）"
            echo ""
            echo "| 平台 | 文件 | 说明 |"
            echo "|------|------|------|"
            echo "| macOS Apple Silicon | \`opennexus-darwin-desktop.tar.gz\` | 解压后双击 \`openNexus.app\` |"
            echo "| Linux x86_64 | \`opennexus-linux-desktop.tar.gz\` | 解压后运行 \`openNexus/launch.sh\` |"
            echo "| Windows x86_64 | \`opennexus-windows-desktop.zip\` | 解压后运行 \`openNexus/launch.bat\` |"
            echo ""
            echo "### 命令行版本"
            echo ""
            echo "| 平台 | 文件 | 说明 |"
            echo "|------|------|------|"
            echo "| macOS Intel | \`opennexus-darwin-amd64.tar.gz\` | 命令行运行 |"
            echo "| macOS Apple Silicon | \`opennexus-darwin-arm64.tar.gz\` | 命令行运行 |"
            echo "| Linux x86_64 | \`opennexus-linux-amd64.tar.gz\` | 命令行运行 |"
            echo "| Linux ARM64 | \`opennexus-linux-arm64.tar.gz\` | 命令行运行 |"
            echo "| Windows x86_64 | \`opennexus-windows-amd64.zip\` | 命令行运行 |"
            echo ""
            echo "### 使用方式"
            echo ""
            echo "- **Electron macOS**：下载 \`.dmg\`，拖拽安装到 Applications 后启动"
            echo "- **Electron Windows**：下载 \`.exe\`，按安装向导完成"
            echo "- **Pake 桌面版**：解压后运行对应启动脚本"
            echo "- **命令行版**：解压后执行 \`./opennexus\`，浏览器访问 http://127.0.0.1:8080"
          } > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: openNexus ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: false
