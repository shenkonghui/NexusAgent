name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || matrix.os == 'linux' && 'ubuntu-latest' || 'windows-latest' }}
    strategy:
      matrix:
        os: [darwin, linux, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev curl lsof
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          fi

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Binary (macOS/Linux)
        if: matrix.os != 'windows'
        run: |
          mkdir -p dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/nexusagent-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/server

      - name: Build Binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:GOOS = "${{ matrix.os }}"
          $env:GOARCH = "${{ matrix.arch }}"
          $env:CGO_ENABLED = "0"
          go build -tags=sqlite_nocgo `
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" `
            -o "dist/nexusagent-${{ matrix.os }}-${{ matrix.arch }}.exe" ./cmd/server

      - name: Package CLI (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          cd dist
          tar czf "nexusagent-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "nexusagent-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Package CLI (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/nexusagent-${{ matrix.os }}-${{ matrix.arch }}.exe" `
            -DestinationPath "dist/nexusagent-${{ matrix.os }}-${{ matrix.arch }}.zip" -Force

      # ========== 桌面客户端：macOS arm64 / Linux amd64 / Windows amd64 ==========
      - name: Setup Rust (Desktop)
        if: |
          (matrix.os == 'darwin' && matrix.arch == 'arm64') ||
          (matrix.os == 'linux' && matrix.arch == 'amd64') ||
          (matrix.os == 'windows' && matrix.arch == 'amd64')
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm (Desktop)
        if: |
          (matrix.os == 'darwin' && matrix.arch == 'arm64') ||
          (matrix.os == 'linux' && matrix.arch == 'amd64') ||
          (matrix.os == 'windows' && matrix.arch == 'amd64')
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pake-cli (Desktop)
        if: |
          (matrix.os == 'darwin' && matrix.arch == 'arm64') ||
          (matrix.os == 'linux' && matrix.arch == 'amd64') ||
          (matrix.os == 'windows' && matrix.arch == 'amd64')
        run: pnpm install -g pake-cli@3.13.0

      - name: Build macOS Desktop (arm64)
        if: matrix.os == 'darwin' && matrix.arch == 'arm64'
        run: |
          chmod +x scripts/build-pake.sh scripts/package-darwin.sh
          ./scripts/build-pake.sh dist ${{ github.ref_name }} app
          ./scripts/package-darwin.sh dist nexusagent-darwin-arm64 dist
          cd dist && tar czf nexusagent-darwin-desktop.tar.gz NexusAgent.app

      - name: Build Linux Desktop (amd64)
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          chmod +x scripts/build-pake.sh scripts/package-linux.sh
          ./scripts/build-pake.sh dist ${{ github.ref_name }} appimage
          ./scripts/package-linux.sh dist nexusagent-linux-amd64 dist
          cd dist && tar czf nexusagent-linux-desktop.tar.gz NexusAgent

      - name: Build Windows Desktop (amd64)
        if: matrix.os == 'windows' && matrix.arch == 'amd64'
        shell: bash
        run: |
          ./scripts/build-pake.sh dist ${{ github.ref_name }} x64

      - name: Package Windows Desktop (amd64)
        if: matrix.os == 'windows' && matrix.arch == 'amd64'
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 -OutDir dist -BinName nexusagent-windows-amd64.exe -PakeDir dist
          Compress-Archive -Path dist/NexusAgent -DestinationPath dist/nexusagent-windows-desktop.zip -Force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexusagent-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        run: |
          {
            echo "## NexusAgent ${{ github.ref_name }}"
            echo ""
            echo "### 桌面客户端（推荐）"
            echo ""
            echo "| 平台 | 文件 | 说明 |"
            echo "|------|------|------|"
            echo "| macOS Apple Silicon | \`nexusagent-darwin-desktop.tar.gz\` | 解压后双击 \`NexusAgent.app\` |"
            echo "| Linux x86_64 | \`nexusagent-linux-desktop.tar.gz\` | 解压后运行 \`NexusAgent/launch.sh\` |"
            echo "| Windows x86_64 | \`nexusagent-windows-desktop.zip\` | 解压后运行 \`NexusAgent/launch.bat\` |"
            echo ""
            echo "### 命令行版本"
            echo ""
            echo "| 平台 | 文件 | 说明 |"
            echo "|------|------|------|"
            echo "| macOS Intel | \`nexusagent-darwin-amd64.tar.gz\` | 命令行运行 |"
            echo "| macOS Apple Silicon | \`nexusagent-darwin-arm64.tar.gz\` | 命令行运行 |"
            echo "| Linux x86_64 | \`nexusagent-linux-amd64.tar.gz\` | 命令行运行 |"
            echo "| Linux ARM64 | \`nexusagent-linux-arm64.tar.gz\` | 命令行运行 |"
            echo "| Windows x86_64 | \`nexusagent-windows-amd64.zip\` | 命令行运行 |"
            echo ""
            echo "### 使用方式"
            echo ""
            echo "- **macOS 桌面版**：解压 \`nexusagent-darwin-desktop.tar.gz\`，双击 \`NexusAgent.app\`"
            echo "- **Linux 桌面版**：解压 \`nexusagent-linux-desktop.tar.gz\`，执行 \`./NexusAgent/launch.sh\`"
            echo "- **Windows 桌面版**：解压 \`nexusagent-windows-desktop.zip\`，双击 \`NexusAgent/launch.bat\`"
            echo "- **命令行版**：解压后执行 \`./nexusagent\`，浏览器访问 http://127.0.0.1:8080"
          } > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexusAgent ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: false
