name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || matrix.os == 'linux' && 'ubuntu-latest' || 'windows-latest' }}
    strategy:
      matrix:
        os: [darwin, linux, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Binary
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/nexusagent-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}" ./cmd/server

      - name: Build (Windows without CGO)
        if: matrix.os == 'windows'
        run: |
          # Windows: 交叉编译时不能启用 CGO，SQLite 使用纯 Go 驱动
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -tags=sqlite_nocgo -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/nexusagent-${{ matrix.os }}-${{ matrix.arch }}.exe" ./cmd/server

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          cd dist
          tar czf "nexusagent-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "nexusagent-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Package (Windows)
        if: matrix.os == 'windows'
        run: |
          cd dist
          Compress-Archive -Path "nexusagent-${{ matrix.os }}-${{ matrix.arch }}.exe" -DestinationPath "nexusagent-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Create macOS .app Bundle
        if: matrix.os == 'darwin'
        run: |
          chmod +x scripts/package-darwin.sh
          ./scripts/package-darwin.sh dist "nexusagent-${{ matrix.os }}-${{ matrix.arch }}"
          cd dist
          tar czf "nexusagent-darwin-${{ matrix.arch }}-app.tar.gz" "NexusAgent.app"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexusagent-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        run: |
          echo "## NexusAgent ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### 下载说明" >> release-notes.md
          echo "" >> release-notes.md
          echo "| 平台 | 文件 | 说明 |" >> release-notes.md
          echo "|------|------|------|" >> release-notes.md
          echo "| macOS Intel | \`nexusagent-darwin-amd64.tar.gz\` | 命令行运行 |" >> release-notes.md
          echo "| macOS Apple Silicon | \`nexusagent-darwin-arm64.tar.gz\` | 命令行运行 |" >> release-notes.md
          echo "| macOS Intel (App) | \`nexusagent-darwin-amd64-app.tar.gz\` | 桌面 App 包 |" >> release-notes.md
          echo "| macOS Apple Silicon (App) | \`nexusagent-darwin-arm64-app.tar.gz\` | 桌面 App 包 |" >> release-notes.md
          echo "| Linux x86_64 | \`nexusagent-linux-amd64.tar.gz\` | 命令行运行 |" >> release-notes.md
          echo "| Linux ARM64 | \`nexusagent-linux-arm64.tar.gz\` | 命令行运行 |" >> release-notes.md
          echo "| Windows x86_64 | \`nexusagent-windows-amd64.zip\` | 命令行运行 |" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexusAgent ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/**/*.tar.gz
          draft: true
          prerelease: false
